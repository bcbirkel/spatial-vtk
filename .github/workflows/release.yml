name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish-to-testpypi:
        description: "Publish this checkout to TestPyPI using Trusted Publishing"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    name: Build and inspect distributions
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install "build>=1.2" "twine>=6.2,<7"

      - name: Build source distribution and wheel
        run: |
          rm -rf dist build src/spatial_vtk.egg-info
          python -m build --sdist --wheel

      - name: Check package metadata
        run: |
          python -m twine check dist/*

      - name: Inspect wheel contents
        run: |
          python - <<'PY'
          import pathlib
          import zipfile

          wheels = sorted(pathlib.Path("dist").glob("*.whl"))
          if not wheels:
              raise SystemExit("No wheel was built.")
          with zipfile.ZipFile(wheels[0]) as zf:
              names = zf.namelist()

          required = [
              "spatial_vtk/config/default_outputs.yaml",
          ]
          for name in required:
              if name not in names:
                  raise SystemExit(f"Wheel is missing required file: {name}")
          if not any(name.startswith("spatial_vtk/visualize/dashboard/") for name in names):
              raise SystemExit("Wheel is missing dashboard modules.")

          forbidden_prefixes = ("data/", "docs/", "tests/", "tools/", "outputs/", "validation_toolkit/")
          if any(name.startswith(forbidden_prefixes) for name in names):
              raise SystemExit("Wheel contains repo-only or private-path content.")
          if any("__pycache__" in name or name.endswith((".pyc", ".DS_Store", ".ipynb")) for name in names):
              raise SystemExit("Wheel contains generated files or notebooks.")
          print(f"checked {wheels[0].name}: {len(names)} files")
          PY

      - name: Minimal wheel import smoke test
        run: |
          rm -rf /tmp/spatial_vtk_wheel_smoke
          python -m pip install --no-deps --target /tmp/spatial_vtk_wheel_smoke dist/spatial_vtk-*.whl
          PYTHONPATH=/tmp/spatial_vtk_wheel_smoke python -c "import spatial_vtk; print(spatial_vtk.__version__)"

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spatial-vtk-dist
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs['publish-to-testpypi']
    environment:
      name: testpypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: spatial-vtk-dist
          path: dist

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: spatial-vtk-dist
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
