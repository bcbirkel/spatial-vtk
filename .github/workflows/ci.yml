name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package and validation extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation,docs,dashboard,waveforms]"

      - name: Run tests
        run: |
          MPLCONFIGDIR=/tmp/mplconfig_svtk python -m pytest -q

      - name: Compile source and tests
        run: |
          python -m compileall -q src tests

      - name: Import every public module
        run: |
          MPLCONFIGDIR=/tmp/mplconfig_svtk python - <<'PY'
          import importlib
          import pathlib
          import sys
          root = pathlib.Path("src/spatial_vtk")
          paths = sorted(root.rglob("*.py"))
          failures = []
          for path in paths:
              if path.name == "__main__.py":
                  continue
              module = ".".join(path.with_suffix("").parts[1:])
              if module.endswith(".__init__"):
                  module = module[:-9]
              try:
                  importlib.import_module(module)
              except Exception as exc:
                  failures.append((module, type(exc).__name__, str(exc)))
          print(f"imported={len(paths) - 1 - len(failures)} failed={len(failures)}")
          for failure in failures:
              print(failure)
          if failures:
              sys.exit(1)
          PY

      - name: CLI smoke tests
        run: |
          svtk --help
          svtk --version
          svtk plot metrics list
          svtk map spatial list
          svtk visualize context list

  docs-and-build:
    name: Docs and package build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package and docs extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation,docs,dashboard,waveforms]"

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Build docs with warnings as errors
        run: |
          MPLCONFIGDIR=/tmp/mplconfig_svtk python -m sphinx -W -b html docs docs/_build/html

      - name: Build source distribution and wheel
        run: |
          python -m build --sdist --wheel

      - name: Check package metadata
        run: |
          python -m twine check dist/*

      - name: Inspect wheel contents
        run: |
          python - <<'PY'
          import pathlib
          import sys
          import zipfile
          wheels = sorted(pathlib.Path("dist").glob("*.whl"))
          if not wheels:
              raise SystemExit("No wheel was built.")
          with zipfile.ZipFile(wheels[0]) as zf:
              names = zf.namelist()
          if any(name.startswith("validation_toolkit/") for name in names):
              raise SystemExit("Wheel unexpectedly contains validation_toolkit.")
          if any(name.startswith("docs/") for name in names):
              raise SystemExit("Wheel unexpectedly contains docs.")
          if any(name.endswith(".ipynb") for name in names):
              raise SystemExit("Wheel unexpectedly contains notebooks.")
          if not any(name.startswith("spatial_vtk/") for name in names):
              raise SystemExit("Wheel does not contain spatial_vtk.")
          print(f"checked {wheels[0].name}: {len(names)} files")
          PY
